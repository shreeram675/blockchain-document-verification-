name: CI

on:
  pull_request:
  push:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Client install
        working-directory: client
        run: npm ci

      - name: Client lint
        working-directory: client
        run: npm run lint

      - name: Client build
        working-directory: client
        run: npm run build

      - name: Server install
        working-directory: server
        run: npm ci

      - name: Server syntax check
        working-directory: server
        run: node --check server.js
