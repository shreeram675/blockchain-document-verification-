name: Integration

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Build client (for server static hosting)
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Start server and check /health
        working-directory: server
        env:
          PORT: 5000
          NODE_ENV: test
        run: |
          node server.js &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/health >/dev/null; then
              echo "health ok"
              exit 0
            fi
            sleep 1
          done
          echo "health check timed out"
          exit 1

